      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function buildGrid() {
        const grid = document.getElementById("talentGrid");
        const shuffled = shuffle(talents);

        shuffled.forEach((t, i) => {
          const card = document.createElement("section");
          card.className = "talent-card";
          card.style.setProperty("--accent", t.accent);

          // Random float delay per card
          const floatDelay = (Math.random() * -5).toFixed(2);

          const socialsHTML = t.socials
            .map(
              (s) =>
                `<a href="${s.url}" data-label="${s.label}" target="_blank" rel="noopener"><i class="${s.icon}"></i></a>`,
            )
            .join("");

          const imageHTML = t.image
            ? `<img src="${t.image}" alt="${t.name}" style="animation-delay:${floatDelay}s"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
               <div class="placeholder" style="display:none">Image not found</div>`
            : `<div class="placeholder">Awaiting<br/>Debut</div>`;

          card.innerHTML = `
            <div class="talent-image-wrap">
              ${imageHTML}
            </div>
            <div class="talent-name">${t.name}</div>
            <div class="talent-tagline">${t.tagline}</div>
            <div class="socials">${socialsHTML}</div>
          `;

          grid.appendChild(card);
        });
      }

      buildGrid();
