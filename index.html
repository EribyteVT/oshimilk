<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oshi Milk</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link href="./index.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1>OSHI MILK</h1>
      <p>Virtual Lactation Agency</p>
    </header>
    <main class="split-container">
      <section class="talent left">
        <div class="talent-image-wrap">
          <img
            src="03.png"
            alt="EribyteVT"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
        </div>
        <div class="talent-name">EribyteVT</div>
        <div class="talent-tagline">Software Engineer</div>
        <div class="socials">
          <a
            href="https://www.twitch.tv/EribyteVT"
            data-label="Twitch"
            target="_blank"
            ><i class="fa-brands fa-twitch"></i
          ></a>
          <a
            href="https://www.youtube.com/@EribyteVT"
            data-label="YouTube Main"
            target="_blank"
            ><i class="fa-brands fa-youtube"></i
          ></a>

          <a
            href="https://www.discord.gg/8pM8kFvP5C"
            data-label="Discord"
            target="_blank"
            ><i class="fa-brands fa-discord"></i
          ></a>
          <a href="https://x.com/EribyteVT" data-label="Twitter" target="_blank"
            ><i class="fa-brands fa-x-twitter"></i
          ></a>
        </div>
      </section>

      <section class="talent right">
        <div class="talent-image-wrap">
          <img
            src="wokeesex.png"
            alt="DragonCatsVT"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
        </div>
        <div class="talent-name">DragonCatsVT</div>
        <div class="talent-tagline">Vampire Bartender</div>
        <div class="socials">
          <a
            href="https://www.twitch.tv/dragoncatsvt"
            data-label="Twitch"
            target="_blank"
            ><i class="fa-brands fa-twitch"></i
          ></a>
          <a
            href="https://discord.com/invite/FYEabfMVD7"
            data-label="Discord"
            target="_blank"
            ><i class="fa-brands fa-discord"></i
          ></a>

          <a
            href="https://www.youtube.com/@DragonCatsVT"
            data-label="YouTube Main"
            target="_blank"
            ><i class="fa-brands fa-youtube"></i
          ></a>
          <a
            href="https://www.youtube.com/@DragonCatsVTVODS"
            data-label="YouTube Vods"
            target="_blank"
            ><i class="fa-brands fa-youtube"></i
          ></a>
          <a
            href="https://x.com/DragonCatsVT"
            data-label="Twitter"
            target="_blank"
            ><i class="fa-brands fa-x-twitter"></i
          ></a>
        </div>
      </section>
    </main>
  </body>
</html>
